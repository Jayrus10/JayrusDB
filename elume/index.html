<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÉLUME — Tienda de Moda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav>
    <a href="#" class="nav-logo" onclick="showView('store')">ÉLU<span>ME</span></a>
    <div class="nav-spacer"></div>
    <div id="navLinks"></div>
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema"></button>
  </nav>

  <main id="mainContent"></main>

  <footer>
    <p>© 2024 ÉLUME Moda — Todos los derechos reservados</p>
  </footer>

  <div id="toast"></div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
      <div class="modal-title">Editar producto</div>
      <input type="hidden" id="edit-id">
      <div class="form-group"><label>Nombre</label><input type="text" id="edit-name"></div>
      <div class="form-group"><label>Precio (MXN)</label><input type="number" id="edit-price" step="0.01"></div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="edit-category">
          <option>Vestidos</option><option>Blusas</option><option>Pantalones</option>
          <option>Chaquetas</option><option>Faldas</option><option>Tops</option><option>General</option>
        </select>
      </div>
      <div class="form-group"><label>Descripción</label><textarea id="edit-desc"></textarea></div>
      <div class="form-group">
        <label>URL de imagen</label>
        <input type="text" id="edit-image" oninput="updatePreview('edit-image','edit-preview')">
        <img id="edit-preview" class="preview-img" src="" alt="Vista previa">
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveEdit()">Guardar cambios</button>
        <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      <div class="modal-title">Agregar producto</div>
      <div class="form-group"><label>Nombre</label><input type="text" id="add-name" placeholder="Ej: Vestido de gala"></div>
      <div class="form-group"><label>Precio (MXN)</label><input type="number" id="add-price" placeholder="0.00" step="0.01"></div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="add-category">
          <option>Vestidos</option><option>Blusas</option><option>Pantalones</option>
          <option>Chaquetas</option><option>Faldas</option><option>Tops</option><option>General</option>
        </select>
      </div>
      <div class="form-group"><label>Descripción</label><textarea id="add-desc" placeholder="Descripción del producto..."></textarea></div>
      <div class="form-group">
        <label>URL de imagen</label>
        <input type="text" id="add-image" oninput="updatePreview('add-image','add-preview')" placeholder="https://...">
        <img id="add-preview" class="preview-img" src="" alt="Vista previa" style="display:none">
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveAdd()">Agregar producto</button>
        <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
