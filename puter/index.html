<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Puter Pro</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root{ --bg:#0f172a; --panel:#1e293b; --accent:#3b82f6; --text:#e2e8f0; --border:#334155; }
        body{ margin:0; font-family:system-ui; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
        header{ padding:10px; background:var(--panel); display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); flex-wrap:wrap; }
        select, input, button{ background:#0f172a; color:var(--text); border:1px solid var(--border); padding:6px 8px; border-radius:6px; }
        button{ cursor:pointer; background:var(--accent); border:none; font-weight:bold; }
        #chat{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .msg{ padding:12px; border-radius:8px; max-width:85%; line-height:1.5; }
        .user{ background:var(--border); align-self:flex-end; }
        .ai{ background:var(--panel); align-self:flex-start; border:1px solid var(--border); }
        footer{ display:flex; padding:15px; gap:8px; background:var(--panel); }
        textarea{ flex:1; resize:none; height:50px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:white; padding:10px; }
        .status{ font-size:11px; opacity: 0.7; }
    </style>
</head>
<body>

<header>
    <select id="model">
        <option value="claude-3-7-sonnet">Claude 3.7 Sonnet</option>
        <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
        <option value="claude-3-haiku">Claude 3 Haiku</option>
        <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Erróneo?)</option>
        <option value="claude-opus-4-6">Claude Opus 4.6</option>
    </select>
    <input type="number" id="temp" step="0.1" min="0" max="2" value="0.7">
    <button onclick="clearChat()" style="background:#ef4444">Limpiar</button>
    <span class="status" id="status">Verificando sesión...</span>
</header>

<div id="chat"></div>

<footer>
    <textarea id="input" placeholder="Escribe aquí... (Enter para enviar)"></textarea>
    <button onclick="send()">Enviar</button>
</footer>

<script>
let messages = JSON.parse(localStorage.getItem("chat_history")) || [];

async function init() {
    try {
        await puter.auth.getUser() || await puter.auth.signIn();
        document.getElementById("status").textContent = "Sesión activa";
        renderHistory();
    } catch (e) {
        document.getElementById("status").textContent = "Error de sesión";
    }
}

function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
    div.innerHTML = role === 'ai' ? marked.parse(text) : text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    return div;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    input.value = "";

    const aiDiv = addMessage("ai", "...");
    let fullText = "";

    try {
        const response = await puter.ai.chat(messages, {
            model: document.getElementById("model").value,
            temperature: parseFloat(document.getElementById("temp").value),
            stream: true 
        });

        aiDiv.innerHTML = "";
        for await (const part of response) {
            if (part.text) {
                fullText += part.text;
                aiDiv.innerHTML = marked.parse(fullText);
                document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
            }
        }
        messages.push({ role: "assistant", content: fullText });
        localStorage.setItem("chat_history", JSON.stringify(messages));
    } catch (e) {
        aiDiv.textContent = "Error: " + e.message;
    }
}

function renderHistory() {
    document.getElementById("chat").innerHTML = "";
    messages.forEach(m => addMessage(m.role, m.content));
}

function clearChat() {
    messages = [];
    localStorage.removeItem("chat_history");
    renderHistory();
}

document.getElementById("input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

init();
</script>
</body>
</html>
