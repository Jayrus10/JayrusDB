<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Puter</title>
<script src="https://js.puter.com/v2/"></script>

<style>
:root{
  --bg:#0f172a;
  --panel:#1e293b;
  --accent:#3b82f6;
  --text:#e2e8f0;
  --border:#334155;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}
header{
  padding:10px;
  background:var(--panel);
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  border-bottom:1px solid var(--border);
}
select,input,button{
  background:#0f172a;
  color:var(--text);
  border:1px solid var(--border);
  padding:6px 8px;
  border-radius:6px;
}
button{ cursor:pointer; }
button:hover{ background:var(--accent); }

#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg{
  margin-bottom:12px;
  padding:10px;
  border-radius:8px;
  max-width:75%;
  white-space:pre-wrap;
}

.user{ background:var(--accent); align-self:flex-end; }
.ai{ background:var(--panel); }

footer{
  display:flex;
  padding:10px;
  gap:8px;
  border-top:1px solid var(--border);
}

textarea{
  flex:1;
  resize:none;
  height:60px;
  border-radius:6px;
  border:1px solid var(--border);
  background:#0f172a;
  color:white;
  padding:8px;
}
.status{
  font-size:12px;
  opacity:.7;
}
</style>
</head>

<body>

<header>
<select id="model">
  <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
  <option value="claude-opus-4-6">Claude Opus 4.6</option>
  <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
</select>

<input type="number" id="temp" step="0.1" min="0" max="2" value="0.7">

<input type="file" id="file">

<button onclick="clearChat()">Limpiar</button>
<span class="status" id="status">Verificando sesión...</span>
</header>

<div id="chat"></div>

<footer>
<textarea id="input" placeholder="Escribe tu mensaje..."></textarea>
<button onclick="send()">Enviar</button>
</footer>

<script>
let messages = JSON.parse(localStorage.getItem("chat")) || [
  { role:"system", content:"Eres un asistente útil." }
];

const chatDiv = document.getElementById("chat");
const statusEl = document.getElementById("status");

function saveChat(){
  localStorage.setItem("chat", JSON.stringify(messages));
}

function addMessage(role,text){
  const div=document.createElement("div");
  div.className="msg "+(role==="user"?"user":"ai");
  div.textContent=text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop=chatDiv.scrollHeight;
}

function renderHistory(){
  chatDiv.innerHTML="";
  messages.forEach(m=>{
    if(m.role!=="system") addMessage(m.role,m.content);
  });
}

async function ensureAuth(){
  try{
    let user = await puter.auth.getUser();
    if(!user){
      await puter.auth.signIn();
      user = await puter.auth.getUser();
    }
    if(!user) throw new Error("401 sesión no válida");
    statusEl.textContent="Sesión activa";
  }catch(e){
    statusEl.textContent="Error autenticación";
    console.error(e);
  }
}

async function send(){
  try{
    const user = await puter.auth.getUser();
    if(!user){
      alert("No hay sesión activa.");
      return;
    }
  }catch(e){
    alert("Sesión inválida.");
    return;
  }

  const input=document.getElementById("input");
  const text=input.value.trim();
  if(!text) return;

  addMessage("user",text);
  messages.push({role:"user",content:text});
  saveChat();
  input.value="";

  const model=document.getElementById("model").value;
  const temperature=parseFloat(document.getElementById("temp").value);

  const aiDiv=document.createElement("div");
  aiDiv.className="msg ai";
  chatDiv.appendChild(aiDiv);

  let full="";

  try{
    const response=await puter.ai.chat(messages,{
      model:model,
      temperature:temperature,
      stream:true
    });

    for await (const part of response){
      const chunk=part?.message?.content?.[0]?.text || "";
      full+=chunk;
      aiDiv.textContent=full;
      chatDiv.scrollTop=chatDiv.scrollHeight;
    }

    messages.push({role:"assistant",content:full});
    saveChat();

  }catch(e){
    aiDiv.textContent="Error API: "+(e?.message || "Fallo desconocido");
    console.error(e);
  }
}

document.getElementById("file").addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(){
    const content=reader.result.substring(0,15000);
    messages.push({
      role:"system",
      content:"Contexto adicional del archivo:\n"+content
    });
    saveChat();
    alert("Archivo añadido al contexto.");
  };
  reader.readAsText(file);
});

function clearChat(){
  messages=[{role:"system",content:"Eres un asistente útil."}];
  localStorage.removeItem("chat");
  renderHistory();
}

renderHistory();
ensureAuth();
</script>

</body>
</html>
